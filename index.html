<script>

     to its original relative path. In the bundled file the inliner pre-populates
     window.__resources with blob URLs; the guard below never overwrites those. */

  document.querySelectorAll('meta[name="ext-resource-dependency"]').forEach(function (m) {
    var id = m.getAttribute('data-resource-id');
    if (!(id in window.__resources)) window.__resources[id] = m.getAttribute('content');
  });
</script>
