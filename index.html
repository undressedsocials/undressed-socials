<meta name="ext-resource-dependency" content="assets/logos/wordmark/blood.svg" data-resource-id="introMarkSm" />
<script>
  /* Fallback so the LIVE (non-bundled) site keeps working: map each resource id
     to its original relative path. In the bundled file the inliner pre-populates
     window.__resources with blob URLs; the guard below never overwrites those. */
  window.__resources = window.__resources || {};
  document.querySelectorAll('meta[name="ext-resource-dependency"]').forEach(function (m) {
    var id = m.getAttribute('data-resource-id');
    if (!(id in window.__resources)) window.__resources[id] = m.getAttribute('content');
  });
</script>
<style>
  /* first-paint / loading colour — match the home pair (sky blue), not the
     CSS default blood-red, so the page loads already in the blue tone. */
  html, body { background: #C6DCFF; }
